<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPI Dashboard – BM Team</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f2f5; --card: #fff; --primary: #1a56db; --primary-light: #e8effe;
    --success: #0e9f6e; --warn: #f59e0b; --danger: #e02424;
    --text: #111827; --muted: #6b7280; --border: #e5e7eb; --radius: 10px;
  }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: linear-gradient(135deg,#1a3a8f,#1a56db); color:#fff; padding:20px 32px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 8px rgba(0,0,0,.2); flex-wrap:wrap; gap:12px; }
  header h1 { font-size:1.4rem; font-weight:700; }
  header p  { font-size:.82rem; opacity:.8; margin-top:2px; }
  .header-controls { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .toggle-group { display:flex; background:rgba(255,255,255,.15); border-radius:8px; overflow:hidden; }
  .toggle-group button { border:none; background:transparent; color:#fff; padding:7px 16px; font-size:.85rem; font-weight:600; cursor:pointer; transition:background .2s; }
  .toggle-group button.active { background:rgba(255,255,255,.3); }
  select { background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); color:#fff; padding:7px 12px; border-radius:8px; font-size:.85rem; cursor:pointer; }
  select option { color:#111; background:#fff; }
  .app-layout { display:flex; align-items:flex-start; }
  .sidebar { width:230px; flex-shrink:0; background:var(--card); border-right:1px solid var(--border); padding:18px 10px; min-height:calc(100vh - 90px); position:sticky; top:0; }
  .sidebar-cat { margin-bottom:4px; }
  .sidebar-cat-btn { width:100%; display:flex; align-items:center; justify-content:space-between; gap:6px; text-align:left; background:none; border:none; padding:10px 12px; font-weight:700; font-size:.83rem; color:var(--text); cursor:pointer; border-radius:8px; transition:background .15s; }
  .sidebar-cat-btn:hover { background:var(--bg); }
  .sidebar-cat-btn.active-cat { background:var(--primary-light); color:var(--primary); }
  .sidebar-caret { font-size:.65rem; color:var(--muted); transition:transform .2s; flex-shrink:0; }
  .sidebar-caret.open { transform:rotate(90deg); }
  .sidebar-sub { display:flex; flex-direction:column; gap:1px; padding-left:10px; margin:2px 0 8px; }
  .sidebar-item { display:block; width:100%; text-align:left; background:none; border:none; padding:8px 12px; font-size:.82rem; color:var(--muted); cursor:pointer; border-radius:6px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:background .15s; }
  .sidebar-item:hover { background:var(--bg); }
  .sidebar-item.active { background:var(--primary); color:#fff; }
  main { padding:0 32px 40px; flex:1; min-width:0; }
  .kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(175px,1fr)); gap:14px; margin:20px 0; }
  .kpi-card { background:var(--card); border-radius:var(--radius); padding:18px 20px; border:1px solid var(--border); box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .kpi-card .label { font-size:.75rem; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); font-weight:600; }
  .kpi-card .value { font-size:2rem; font-weight:800; line-height:1.1; margin:6px 0 4px; }
  .kpi-card .sub   { font-size:.78rem; color:var(--muted); }
  .kpi-card .actual { font-size:.82rem; font-weight:600; margin-top:6px; }
  .section-title { font-size:1rem; font-weight:700; margin:24px 0 12px; display:flex; align-items:center; gap:8px; }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }
  .progress-block { background:var(--card); border-radius:var(--radius); padding:20px; border:1px solid var(--border); margin-bottom:14px; }
  .progress-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  .progress-name   { font-weight:700; font-size:.95rem; }
  .progress-nums   { font-size:.85rem; color:var(--muted); }
  .progress-bar-bg   { background:#e9ecef; border-radius:99px; height:10px; overflow:hidden; }
  .progress-bar-fill { height:100%; border-radius:99px; transition:width .6s ease; }
  .progress-sub { display:flex; justify-content:space-between; font-size:.75rem; color:var(--muted); margin-top:5px; }
  .two-col   { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .three-col { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
  @media(max-width:1100px){ .three-col { grid-template-columns:1fr 1fr; } }
  @media(max-width:700px) { .two-col,.three-col { grid-template-columns:1fr; } }
  .chart-card { background:var(--card); border-radius:var(--radius); padding:20px; border:1px solid var(--border); }
  .chart-card h3 { font-size:.9rem; font-weight:700; color:var(--muted); margin-bottom:14px; }
  .chart-wrap    { position:relative; height:260px; }
  .table-card { background:var(--card); border-radius:var(--radius); border:1px solid var(--border); overflow:hidden; }
  table { width:100%; border-collapse:collapse; font-size:.84rem; }
  thead th { background:var(--primary-light); color:var(--primary); font-weight:700; padding:10px 14px; text-align:right; font-size:.77rem; text-transform:uppercase; letter-spacing:.4px; }
  thead th:first-child { text-align:left; }
  tbody td { padding:9px 14px; border-top:1px solid var(--border); text-align:right; }
  tbody td:first-child { text-align:left; font-weight:600; }
  tbody tr:hover { background:#f8f9fa; }
  .norm-intro { background:var(--primary-light); border:1px solid #c3d2f9; border-radius:var(--radius); padding:14px 18px; margin-bottom:16px; font-size:.88rem; line-height:1.7; }
  .norm-intro strong { color:var(--primary); }
  .recommend-box { background:#f0fdf4; border:1px solid #86efac; border-radius:var(--radius); padding:16px 20px; margin-bottom:16px; }
  .recommend-box h3 { font-size:.95rem; font-weight:700; color:#166534; margin-bottom:8px; }
  .recommend-box p  { font-size:.88rem; color:#166534; line-height:1.7; }
  .recommend-box .big { font-size:2.2rem; font-weight:800; color:#16a34a; line-height:1; display:inline-block; margin:4px 6px 4px 0; }
  .info-box { border-radius:var(--radius); padding:12px 16px; margin-bottom:16px; font-size:.84rem; line-height:1.6; }
  .info-box.amber { background:#fffbeb; border:1px solid #fde68a; color:#92400e; }
  .info-box.blue  { background:#eff6ff; border:1px solid #bfdbfe; color:#1e40af; }
  .badge { display:inline-block; padding:2px 8px; border-radius:99px; font-size:.72rem; font-weight:700; }
  .badge-green  { background:#d1fae5; color:#065f46; }
  .badge-blue   { background:#dbeafe; color:#1e40af; }
  .badge-orange { background:#fef3c7; color:#92400e; }
  .person-header { background:var(--card); border-radius:var(--radius); padding:18px 24px; border:1px solid var(--border); margin:16px 0; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  .person-name { font-size:1.3rem; font-weight:800; }
  .person-meta { display:flex; gap:10px; flex-wrap:wrap; }
  .meta-pill { background:var(--primary-light); color:var(--primary); padding:5px 12px; border-radius:99px; font-size:.82rem; font-weight:600; }

  /* COACHING TAB */
  .coach-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; margin:20px 0; }
  .coach-card { background:var(--card); border-radius:var(--radius); border:1px solid var(--border); overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.07); }
  .coach-card-header { padding:14px 18px; display:flex; align-items:center; justify-content:space-between; }
  .coach-card-header .name { font-weight:800; font-size:1rem; }
  .coach-card-header .status { font-size:1.4rem; }
  .coach-card-body { padding:0 18px 16px; }
  .coach-metric { display:flex; justify-content:space-between; font-size:.82rem; padding:5px 0; border-bottom:1px solid var(--border); }
  .coach-metric:last-child { border-bottom:none; }
  .coach-metric .mk { color:var(--muted); }
  .coach-metric .mv { font-weight:700; }
  .focus-list { list-style:none; padding:0; margin:0; }
  .focus-list li { padding:10px 14px; border-left:4px solid transparent; margin-bottom:6px; border-radius:0 6px 6px 0; font-size:.85rem; line-height:1.5; background:#f9fafb; }
  .focus-list li.prio-red    { border-color:var(--danger);  background:#fef2f2; }
  .focus-list li.prio-orange { border-color:var(--warn);    background:#fffbeb; }
  .focus-list li.prio-green  { border-color:var(--success); background:#f0fdf4; }
  .focus-list li .icon { margin-right:6px; }
  .focus-list li .reason { display:block; font-size:.78rem; color:var(--muted); margin-top:3px; }
  .funnel-row { display:flex; align-items:center; gap:6px; font-size:.8rem; margin:6px 0; flex-wrap:wrap; }
  .funnel-box { background:var(--primary-light); color:var(--primary); padding:4px 10px; border-radius:6px; font-weight:700; white-space:nowrap; }
  .funnel-arrow { color:var(--muted); font-size:1rem; }
  .funnel-pct { font-size:.75rem; color:var(--muted); }
  .week-actions { background:#f8faff; border:1px solid #dbeafe; border-radius:var(--radius); padding:14px 18px; margin-top:16px; }
  .week-actions h4 { font-size:.88rem; font-weight:700; color:var(--primary); margin-bottom:10px; }
  .week-actions ul { padding-left:16px; font-size:.85rem; line-height:1.8; color:var(--text); }
  .detail-section { background:var(--card); border-radius:var(--radius); border:1px solid var(--border); padding:20px; margin-bottom:16px; }
  .detail-section h3 { font-size:1rem; font-weight:700; margin-bottom:14px; display:flex; align-items:center; gap:8px; }

  /* ── PIPELINE KANBAN GRID ──────────────────────────────────────────────── */
  .pipe-grid-wrap { overflow-x:auto; margin-top:8px; }
  .pipe-grid { display:grid; grid-template-columns:68px repeat(5,1fr); gap:5px; min-width:720px; }
  .pipe-grid-corner { }
  .pipe-col-hdr { padding:8px 10px; border-radius:8px; font-weight:700; font-size:.78rem; text-align:center; display:flex; align-items:center; justify-content:center; gap:6px; }
  .pipe-count-sm { border-radius:99px; padding:1px 6px; font-size:.7rem; font-weight:700; background:rgba(0,0,0,.1); }
  .pipe-row { display:contents; }
  .pipe-week-label { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:6px 3px; border-radius:8px; background:#f3f4f6; border:1px solid var(--border); min-height:72px; }
  .pipe-wk-now  { background:#eff6ff; border-color:#93c5fd; }
  .pipe-wk-past { background:#f9fafb; }
  .pipe-wk-num  { font-weight:800; font-size:.86rem; }
  .pipe-wk-tag  { font-size:.65rem; color:var(--muted); margin-top:2px; text-align:center; line-height:1.2; }
  .pipe-cell { background:#f8faff; border:1px solid #e5e7eb; border-radius:8px; padding:6px; min-height:72px; display:flex; flex-direction:column; gap:4px; transition:background .12s,border .12s; }
  .pipe-cell-now  { background:#f0f7ff; border-color:#bfdbfe; }
  .pipe-cell-past { background:#f9fafb; }
  .pipe-cell.drag-over { background:#dbeafe !important; border:2px dashed #3b82f6 !important; }
  .pipe-card { background:#fff; border:1px solid var(--border); border-radius:7px; padding:7px 9px; cursor:grab; box-shadow:0 1px 3px rgba(0,0,0,.07); user-select:none; }
  .pipe-card:hover { box-shadow:0 2px 6px rgba(0,0,0,.13); }
  .pipe-card.dragging { opacity:.35; }
  .pipe-card .card-naam { font-weight:700; font-size:.79rem; color:var(--text); display:flex; justify-content:space-between; align-items:flex-start; gap:3px; }
  .pipe-card .card-sub  { font-size:.68rem; color:var(--muted); margin-top:2px; }
  .pipe-card .card-del  { background:none; border:none; color:#d1d5db; cursor:pointer; font-size:.75rem; padding:1px 3px; border-radius:3px; flex-shrink:0; line-height:1; }
  .pipe-card .card-del:hover { color:var(--danger); background:#fef2f2; }
  .pipe-card .card-edit { background:none; border:none; color:#d1d5db; cursor:pointer; font-size:.75rem; padding:1px 3px; border-radius:3px; flex-shrink:0; line-height:1; }
  .pipe-card .card-edit:hover { color:var(--primary); background:var(--primary-light); }
  .card-naam-btns { display:flex; align-items:center; gap:2px; flex-shrink:0; }
  .card-aanb-row   { display:flex; align-items:center; gap:5px; margin-top:5px; padding-top:4px; border-top:1px solid var(--border); }
  .card-aanb-label { font-size:.68rem; color:var(--muted); white-space:nowrap; }
  .card-aanb-input { width:46px; border:1px solid var(--border); border-radius:5px; padding:2px 4px; font-size:.82rem; font-weight:700; text-align:center; outline:none; color:var(--primary); }
  .card-aanb-input:focus { border-color:var(--primary); box-shadow:0 0 0 2px #dbeafe; }
  .pipe-add-btn { background:none; border:1px dashed #d1d5db; border-radius:5px; padding:3px 6px; font-size:.72rem; color:var(--muted); cursor:pointer; text-align:center; transition:all .13s; margin-top:auto; width:100%; }
  .pipe-add-btn:hover { border-color:var(--primary); color:var(--primary); background:var(--primary-light); }
  .pipe-cell-hdr { display:flex; align-items:center; justify-content:space-between; padding:4px 7px; margin:-6px -6px 6px; border-radius:7px 7px 0 0; border-bottom:1px solid rgba(0,0,0,.06); }
  .pipe-cell-hdr-name { font-size:.65rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
  .pipe-cell-hdr-cnt { font-size:.68rem; font-weight:800; color:var(--primary); background:var(--primary-light); border-radius:99px; padding:1px 6px; min-width:18px; text-align:center; }
  .pipe-wk-total { font-size:.64rem; font-weight:800; color:var(--primary); background:var(--primary-light); border-radius:99px; padding:1px 5px; margin-top:3px; }
  /* modal */
  .pipe-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:2000; align-items:center; justify-content:center; }
  .pipe-modal-overlay.open { display:flex; }
  .pipe-modal { background:#fff; border-radius:14px; padding:26px 28px; width:360px; box-shadow:0 12px 40px rgba(0,0,0,.22); }
  .pipe-modal h4 { font-size:1rem; font-weight:800; margin-bottom:4px; }
  .pipe-modal .pipe-modal-sub { font-size:.8rem; color:var(--muted); margin-bottom:16px; }
  .pipe-modal input, .pipe-modal textarea, .pipe-modal select { width:100%; border:1px solid var(--border); border-radius:8px; padding:10px 12px; font-size:.88rem; font-family:inherit; margin-bottom:10px; outline:none; display:block; resize:vertical; background:#fff; }
  .pipe-modal input:focus, .pipe-modal textarea:focus, .pipe-modal select:focus { border-color:var(--primary); box-shadow:0 0 0 3px #dbeafe; }
  .pipe-modal-btns { display:flex; gap:8px; justify-content:flex-end; margin-top:4px; }
  .pipe-modal-btns button { padding:9px 20px; border-radius:8px; font-size:.88rem; font-weight:700; cursor:pointer; border:none; }
  .pipe-modal-cancel { background:#f3f4f6; color:var(--muted); }
  .pipe-modal-ok { background:var(--primary); color:#fff; }
  .pipe-modal-ok:hover { background:#1649c0; }

</style>
</head>
<body>

<header>
  <div>
    <h1>📊 KPI Dashboard – Business Managers</h1>
    <p>Normen o.b.v. individuele data laatste 26 weken · Actueel = gem. YTD</p>
  </div>
  <div class="header-controls">
    <div class="toggle-group">
      <button id="btnWeek" class="active" onclick="setView('week')">Per Week</button>
      <button id="btnMaand" onclick="setView('maand')">Per Maand</button>
    </div>
    <select id="yearSelect" onchange="render()">
      <option value="2026">2026</option>
      <option value="2025">2025</option>
      <option value="2024">2024</option>
      <option value="2023">2023</option>
      <option value="2022">2022</option>
    </select>
    <div id="user-box" style="display:none; align-items:center; gap:8px;">
      <span class="meta-pill" id="current-user-pill" style="background:rgba(255,255,255,.15); color:#fff;"></span>
      <button onclick="logout()" style="background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); color:#fff; padding:6px 14px; border-radius:8px; font-size:.82rem; font-weight:600; cursor:pointer;">Uitloggen</button>
    </div>
  </div>
</header>

<!-- Login-scherm: zichtbaar zodra de database (Supabase) gekoppeld is -->
<div id="login-screen" class="pipe-modal-overlay" style="display:none;">
  <div class="pipe-modal" style="width:340px;">
    <h4>🔐 Inloggen</h4>
    <p class="pipe-modal-sub">Log in met het account dat de manager voor je heeft aangemaakt.</p>
    <input type="email" id="login-email" placeholder="E-mailadres" autocomplete="username"/>
    <input type="password" id="login-password" placeholder="Wachtwoord" autocomplete="current-password" onkeydown="if(event.key==='Enter') handleLoginClick()"/>
    <p id="login-error" style="color:var(--danger); font-size:.8rem; min-height:1.1em; margin:-4px 0 8px;"></p>
    <div class="pipe-modal-btns" style="justify-content:stretch;">
      <button class="pipe-modal-ok" style="width:100%;" onclick="handleLoginClick()">Inloggen</button>
    </div>
  </div>
</div>

<div id="app-root" class="app-layout" style="display:none;">
  <aside class="sidebar" id="sidebar"></aside>
  <main id="main"></main>
</div>

// ── ISO week helper ───────────────────────────────────────────────────────────
function isoWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
  const y0 = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return { year: d.getUTCFullYear(), week: Math.ceil((((d - y0) / 86400000) + 1) / 7) };
}

const TODAY      = new Date();
// CUR is altijd de echte, actuele ISO-week — wordt bij elke pagina-load opnieuw
// berekend, dus de invoer en alle ratio's/coaching schuiven automatisch mee.
const CUR        = isoWeek(TODAY);
const CUTOFF     = isoWeek(new Date(+TODAY - 26 * 7 * 86400000));

function inLast26(d) {
  if (d.jaar === CUR.year && d.jaar === CUTOFF.year) return d.week >= CUTOFF.week && d.week <= CUR.week;
  if (d.jaar === CUTOFF.year) return d.week >= CUTOFF.week;
  if (d.jaar === CUR.year)   return d.week <= CUR.week;
  return d.jaar > CUTOFF.year && d.jaar < CUR.year;
}

// ── Ratios (laatste 26 weken) ─────────────────────────────────────────────────
function computeRatios(naam) {
  const src = RAW.filter(d => (naam ? d.naam === naam : !EXCL.has(d.naam)) && inLast26(d));
  const tot = { intakes:0, bezoeken:0, aanbiedingen:0, matchgesprekken:0, starters:0 };
  for (const d of src) for (const k of KPIS) tot[k] += d[k];
  const s = tot.starters || 1;
  return {
    totals: tot,
    intakes:         +(tot.intakes/s).toFixed(2),
    bezoeken:        +(tot.bezoeken/s).toFixed(2),
    aanbiedingen:    +(tot.aanbiedingen/s).toFixed(2),
    matchgesprekken: +(tot.matchgesprekken/s).toFixed(2),
    totalStarters:   tot.starters,
    weeksUsed:       src.length,
  };
}

let INDIVIDUAL_RATIOS = {};
let TEAM_RATIOS = {};
function recomputeRatios() {
  INDIVIDUAL_RATIOS = {};
  for (const bm of BMS) INDIVIDUAL_RATIOS[bm.naam] = computeRatios(bm.naam);
  TEAM_RATIOS = computeRatios(null);
}
recomputeRatios();

// ── Helpers ───────────────────────────────────────────────────────────────────
function weekToMonth(w) { return Math.ceil(w / (52/12)); }
function fmt(n, dec=1)  { return (+n).toFixed(dec); }
function pct(a,b)       { return b ? Math.min(100, Math.round(a/b*100)) : 0; }
function barColor(p)    { return p>=90?'var(--success)':p>=60?'var(--warn)':' var(--danger)'; }

function filterData(naam, year) {
  return RAW.filter(d => (!naam || d.naam===naam) && d.jaar===year);
}

function aggregateByPeriod(rows, period) {
  const map = {};
  for (const d of rows) {
    const key = period==='week' ? d.week : weekToMonth(d.week);
    if (!map[key]) map[key] = { period:key, intakes:0, bezoeken:0, aanbiedingen:0, matchgesprekken:0, starters:0 };
    for (const k of KPIS) map[key][k] += d[k];
  }
  return Object.values(map).sort((a,b) => a.period - b.period);
}

function ytdTotals(rows) {
  const t = { intakes:0, bezoeken:0, aanbiedingen:0, matchgesprekken:0, starters:0 };
  for (const d of rows) for (const k of KPIS) t[k] += d[k];
  return t;
}

function periodsPassedInYear(year, period) {
  if (year < CUR.year) return period==='week' ? 52 : 12;
  return period==='week' ? CUR.week : weekToMonth(CUR.week);
}

function normPerPeriod(doel_jaar, ratios, period) {
  const f = period==='week' ? 1/52 : 1/12;
  const s = doel_jaar * f;
  return {
    starters:        +s.toFixed(3),
    intakes:         +(ratios.intakes         * s).toFixed(1),
    bezoeken:        +(ratios.bezoeken        * s).toFixed(1),
    aanbiedingen:    +(ratios.aanbiedingen    * s).toFixed(1),
    matchgesprekken: +(ratios.matchgesprekken * s).toFixed(1),
  };
}

function yearlyTotals(naam) {
  return [2022,2023,2024,2025,2026].map(yr => {
    const rows = RAW.filter(d => d.naam===naam && d.jaar===yr);
    if (!rows.length) return null;
    const t = ytdTotals(rows);
    return { jaar:yr, weken:rows.length, ...t };
  }).filter(Boolean);
}

// ── Charts ────────────────────────────────────────────────────────────────────
function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

function makeChart(id, labels, datasets, type='line') {
  destroyChart(id);
  const ctx = document.getElementById(id)?.getContext('2d');
  if (!ctx) return;
  charts[id] = new Chart(ctx, {
    type,
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend:{position:'top',labels:{boxWidth:12,font:{size:11}}}, tooltip:{mode:'index',intersect:false} },
      scales: {
        x: { grid:{display:false}, ticks:{font:{size:10}} },
        y: { beginAtZero:true, grid:{color:'#f0f0f0'}, ticks:{font:{size:10}} }
      }
    }
  });
}

      <tbody>${doelRijen}</tbody>
    </table></div>

    <!-- Individuele ratio's -->
    <div class="section-title">Individuele ratio's huidige BM's (laatste 26 weken)</div>
    <div class="table-card"><table>
      <thead><tr>
        <th>BM</th><th>Intakes/starter</th><th>Bezoeken/starter</th>
        <th>Aanbied./starter</th><th>Match/starter</th><th>Starters</th><th>Weekrecords</th>
      </tr></thead>
      <tbody>${bmRatioRows}</tbody>
    </table></div>

    <!-- Historisch -->
    <div class="section-title">Team historisch overzicht per jaar</div>
    <div class="table-card"><table>
      <thead><tr>
        <th>Jaar</th><th>Intakes</th><th>Bezoeken</th>
        <th>Aanbiedingen</th><th>Match</th><th>Starters</th><th>Mensen</th>
      </tr></thead>
      <tbody>${histRows}</tbody>
    </table></div>
  </div>`;

  setTimeout(() => {
    // 1. Starters per maand (lijn)
    const maandLabels = aggM.map(a => 'M'+a.period);
    makeChart('chartTS', maandLabels, [
      { label:'Starters', data:aggM.map(a=>a.starters), borderColor:'#f59e0b', backgroundColor:'#f59e0b22', fill:true, tension:.3, pointRadius:4 },
    ]);

    // 2. Aanbiedingen per week (lijn) + normlijn
    const weekLabels = aggW.map(a => 'W'+a.period);
    makeChart('chartAanb', weekLabels, [
      { label:'Aanbiedingen', data:aggW.map(a=>a.aanbiedingen), borderColor:'#7e3af2', backgroundColor:'#7e3af222', fill:true, tension:.3, pointRadius:2 },
      { label:`Norm (${aanbNormPerWeek}/wk)`, data:aggW.map(()=>aanbNormPerWeek), borderColor:'#e02424', borderDash:[5,4], pointRadius:0 },
    ]);

    // 3. Activiteiten staafdiagram per maand
    makeChart('chartBar', maandLabels, [
      { label:'Intakes',   data:aggM.map(a=>a.intakes),         backgroundColor:'#1a56db99', borderColor:'#1a56db', borderWidth:1 },
      { label:'Bezoeken',  data:aggM.map(a=>a.bezoeken),        backgroundColor:'#0e9f6e99', borderColor:'#0e9f6e', borderWidth:1 },
      { label:'Match',     data:aggM.map(a=>a.matchgesprekken), backgroundColor:'#e0242499', borderColor:'#e02424', borderWidth:1 },
    ], 'bar');
  }, 50);
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  renderTabs();
  Object.values(charts).forEach(c => c?.destroy()); charts = {};
  if (currentTab < BMS.length) renderBM(BMS[currentTab]);
  else if (currentTab === BMS.length)     renderTeam();
  else if (currentTab === BMS.length + 1) renderCoaching();
  else                                    renderPrognose();
}

// ── Wekelijkse invoer (BM/manager voert eigen KPI-cijfers in) ─────────────────
// Namen van BM's die hun (al opgeslagen) invoer voor de huidige week tijdelijk
// hebben 'ontgrendeld' via de Wijzigen-knop. Reset bij elke page-load/nieuwe week.
let WEEKLY_EDIT_UNLOCKED = new Set();

function renderWeeklyEntry(bm) {
  if (!canEdit(bm.naam)) return '';
  if (!supa) {
    return `<div class="info-box blue">✏️ <strong>Invoer</strong> komt beschikbaar zodra de database is gekoppeld (zie setup-instructies.md).</div>`;
  }
  const safeId      = bm.naam.replace(/\s+/g,'_');
  const existingRow = RAW.find(d => d.naam === bm.naam && d.jaar === CUR.year && d.week === CUR.week);
  const existing     = existingRow || {};
  const alreadySaved = !!existingRow;
  const unlocked      = !alreadySaved || WEEKLY_EDIT_UNLOCKED.has(bm.naam);

  const frozen = alreadySaved && !unlocked;

  const fields = KPIS.map(k => `
    <div>
      <label style="display:block;font-size:.72rem;color:var(--muted);margin-bottom:3px;">${KPI_LABELS[k]}</label>
      <input type="number" min="0" id="inv-${k}-${safeId}" value="${existing[k] ?? 0}" ${unlocked?'':'disabled'} style="width:74px;border:1px solid ${frozen?'#bbf7d0':'var(--border)'};border-radius:6px;padding:5px 7px;font-size:.85rem;font-weight:${frozen?'700':'400'};${frozen?'background:#f0fdf4;color:#15803d;':''}">
    </div>`).join('');

  const actionBtn = unlocked
    ? `<button onclick="saveWeeklyEntry('${escApos(bm.naam)}')" style="background:var(--primary);color:#fff;border:none;border-radius:6px;padding:7px 16px;font-weight:700;font-size:.85rem;cursor:pointer;">🔒 Opslaan</button>`
    : `<button onclick="unlockWeeklyEntry('${escApos(bm.naam)}')" style="background:#fff;color:var(--primary);border:1px solid var(--primary);border-radius:6px;padding:7px 16px;font-weight:700;font-size:.85rem;cursor:pointer;">✏️ Wijzigen</button>`;

  const statusText = frozen
    ? `<span style="display:inline-flex;align-items:center;gap:4px;background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;border-radius:999px;padding:4px 10px;font-size:.78rem;font-weight:700;">🔒 Bevroren &amp; opgeslagen voor deze week</span>`
    : '';

  return `<div class="week-actions" style="margin-bottom:16px;">
    <h4>✏️ Invoer week ${CUR.week} · ${CUR.year}</h4>
    <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;">
      ${fields}
      ${actionBtn}
      <span id="inv-status-${safeId}">${statusText}</span>
    </div>
  </div>`;
}

function unlockWeeklyEntry(bmNaam) {
  WEEKLY_EDIT_UNLOCKED.add(bmNaam);
  render();
}

async function saveWeeklyEntry(bmNaam) {
  if (!supa || !CURRENT_USER) return;
  const safeId   = bmNaam.replace(/\s+/g,'_');
  const statusEl = document.getElementById(`inv-status-${safeId}`);
  const vals = {};
  for (const k of KPIS) vals[k] = parseInt(document.getElementById(`inv-${k}-${safeId}`)?.value, 10) || 0;
  const payload = { bm_naam: bmNaam, jaar: CUR.year, week: CUR.week, ...vals, updated_by: CURRENT_USER.id, updated_at: new Date().toISOString() };
  if (statusEl) statusEl.textContent = 'Opslaan…';
  const { error } = await supa.from('kpi_weekly').upsert(payload, { onConflict: 'bm_naam,jaar,week' });
  if (error) { if (statusEl) statusEl.textContent = '❌ ' + error.message; return; }
  WEEKLY_EDIT_UNLOCKED.delete(bmNaam);
  await loadKpiWeekly();
  recomputeRatios();
  render();
}

// ── Database: KPI-weekdata laden ───────────────────────────────────────────────
async function loadKpiWeekly() {
  if (!supa) return; // blijft op de ingebouwde voorbeelddata
  const { data, error } = await supa.from('kpi_weekly').select('*');
  if (error) { console.error('KPI-data laden mislukt:', error); return; }
  if (data) {
    RAW = data.map(r => ({
      naam: r.bm_naam, jaar: r.jaar, week: r.week,
      intakes: r.intakes||0, bezoeken: r.bezoeken||0, aanbiedingen: r.aanbiedingen||0,
      matchgesprekken: r.matchgesprekken||0, starters: r.starters||0,
    }));
  }
}

async function loadAllData() {
  await loadKpiWeekly();
  await pipeFetchAll();
  recomputeRatios();
}

// ── Login / authenticatie (Supabase Auth) ──────────────────────────────────────
function showLogin(msg) {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-root').style.display = 'none';
  const err = document.getElementById('login-error');
  if (err) err.textContent = msg || '';
}
function showLoginError(msg) { showLogin(msg); }

function handleLoginClick() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { showLoginError('Vul e-mailadres en wachtwoord in.'); return; }
  doLogin(email, password);
}

async function doLogin(email, password) {
  if (!supa) { showLoginError('Database nog niet gekoppeld. Vraag de manager dit eerst in te stellen.'); return; }
  const { error } = await supa.auth.signInWithPassword({ email, password });
  if (error) { showLoginError('Inloggen mislukt: ' + error.message); return; }
  await loadProfileAndStart();
}

async function loadProfileAndStart() {
  const { data: { user } } = await supa.auth.getUser();
  if (!user) { showLogin(); return; }
  const { data: profile, error } = await supa.from('profiles').select('*').eq('id', user.id).single();
  if (error || !profile) {
    showLoginError('Geen profiel gevonden voor dit account. Vraag de manager dit aan te maken.');
    return;
  }
  CURRENT_USER = profile;
  if (CURRENT_USER.rol === 'bm') {
    const idx = BMS.findIndex(b => b.naam === CURRENT_USER.bm_naam);
    currentTab = idx >= 0 ? idx : 0;
  }
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-root').style.display = '';
  document.getElementById('user-box').style.display = 'flex';
  document.getElementById('current-user-pill').textContent =
    `👤 ${profile.naam} (${profile.rol === 'manager' ? 'Manager' : 'Business Manager'})`;
  await loadAllData();
  render();
  subscribeRealtime();
}

function logout() { if (supa) supa.auth.signOut().then(() => location.reload()); }

// ── Live updates: manager-/teamscherm volgt invoer van anderen automatisch ────
function subscribeRealtime() {
  if (!supa) return;
  supa.channel('kpi-dashboard-live')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'kpi_weekly' }, async () => {
      await loadKpiWeekly(); recomputeRatios(); render();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'pipeline_cards' }, async () => {
      await pipeFetchAll(); render();
    })
    .subscribe();
}

// ── Opstarten ───────────────────────────────────────────────────────────────────
async function initApp() {
  if (!supa) {
    // Geen database gekoppeld: demo-modus met ingebouwde voorbeelddata, geen login
    document.getElementById('app-root').style.display = '';
    render();
    return;
  }
  const { data: { session } } = await supa.auth.getSession();
  if (session) { await loadProfileAndStart(); }
  else { showLogin(); }
}
initApp();

// ── Coaching Panel ────────────────────────────────────────────────────────────
function renderCoaching() {
  const year   = getYear();
  const CUR_WK = CUR.week;

  // Per BM: compute all signals
  const bmData = BMS.map(bm => {
    const r26   = INDIVIDUAL_RATIOS[bm.naam];
    const rowsYTD = filterData(bm.naam, year);
    const ytd   = ytdTotals(rowsYTD);

    // Last 4 weeks in current year
    const rows4 = RAW.filter(d => d.naam===bm.naam && d.jaar===CUR.year && d.week >= (CUR.week-3) && d.week <= CUR.week);
    const t4    = ytdTotals(rows4);

    // Expected starters YTD
    const expectedStarters = +(bm.doel * CUR_WK / 52).toFixed(1);
    const starterGap       = +(ytd.starters - expectedStarters).toFixed(1);
    const starterPctOfDoel = pct(ytd.starters, bm.doel);

    // Funnel conversions (26 weeks basis)
    const r     = r26.totals;
    const i2a   = r.intakes   ? +(r.aanbiedingen    / r.intakes).toFixed(1)    : 0;
    const a2m   = r.aanbiedingen ? +(r.matchgesprekken / r.aanbiedingen * 100).toFixed(1) : 0;
    const m2s   = r.matchgesprekken ? +(r.starters / r.matchgesprekken * 100).toFixed(1)  : 0;

    // Team benchmarks (last 26 wks)
    const tr    = TEAM_RATIOS.totals;
    const ti2a  = tr.intakes   ? +(tr.aanbiedingen    / tr.intakes).toFixed(1)    : 0;
    const ta2m  = tr.aanbiedingen ? +(tr.matchgesprekken / tr.aanbiedingen * 100).toFixed(1) : 0;
    const tm2s  = tr.matchgesprekken ? +(tr.starters / tr.matchgesprekken * 100).toFixed(1)  : 0;

    // YTD averages per week: gebruik verstreken weken in het jaar, niet weekrecords in data
    const wksYTD = periodsPassedInYear(year, 'week') || 1;
    const ytdPerWk = {};
    for (const k of KPIS) ytdPerWk[k] = +(ytd[k] / wksYTD).toFixed(1);

    // Norm per week
    const norm = normPerPeriod(bm.doel, r26, 'week');

    // Recent trend (last 4 wks vs YTD avg)
    const trend = {};
    for (const k of KPIS) {
      const recent = rows4.length ? +(t4[k]/rows4.length).toFixed(1) : 0;
      trend[k] = { recent, ytdAvg: +ytdPerWk[k], delta: +(recent - ytdPerWk[k]).toFixed(1) };
    }

    // Generate coaching points
    const points = [];

    // 1. Starter gap
    if (starterGap < -1.5) {
      const wksLeft = 52 - CUR_WK;
      const extra   = +(-starterGap / (wksLeft/52)).toFixed(1);
      points.push({
        prio: 'red',
        icon: '🚨',
        title: `Achterstand starters: ${Math.abs(starterGap)} achter op schema`,
        reason: `${fmt(ytd.starters,1)} gerealiseerd, ${expectedStarters} verwacht. Nog ${wksLeft} weken — doel vereist extra focus.`
      });
    } else if (starterGap < 0) {
      points.push({
        prio: 'orange',
        icon: '⚠️',
        title: `Lichte achterstand: ${Math.abs(starterGap)} starters achter op schema`,
        reason: `${fmt(ytd.starters,1)} gerealiseerd, ${expectedStarters} verwacht bij week ${CUR_WK}.`
      });
    } else {
      points.push({
        prio: 'green',
        icon: '✅',
        title: `Op koers: ${starterGap >= 0 ? '+'+starterGap : starterGap} t.o.v. verwacht schema`,
        reason: `${fmt(ytd.starters,1)} starters YTD bij een verwachting van ${expectedStarters}.`
      });
    }

    // 2. Intakes volume
    if (ytdPerWk.intakes < norm.intakes * 0.75) {
      points.push({
        prio: 'red',
        icon: '👥',
        title: 'Intake-volume te laag',
        reason: `Gem. ${ytdPerWk.intakes}/week YTD vs. norm ${norm.intakes}/week. Meer gesprekken met kandidaten nodig als basis voor de funnel.`
      });
    } else if (ytdPerWk.intakes < norm.intakes * 0.9) {
      points.push({
        prio: 'orange',
        icon: '👥',
        title: 'Intake-volume onder norm',
        reason: `Gem. ${ytdPerWk.intakes}/week YTD vs. norm ${norm.intakes}/week. Kleine verbetering gewenst.`
      });
    }

    // 3. Bezoeken (commercial visits)
    if (r26.totals.bezoeken === 0 && r26.weeksUsed > 4) {
      points.push({
        prio: 'red',
        icon: '🤝',
        title: 'Geen commerciële bezoeken geregistreerd',
        reason: `In de laatste 26 weken staan nul bezoeken. Klantrelaties opbouwen is essentieel voor opdrachtstroom.`
      });
    } else if (ytdPerWk.bezoeken < norm.bezoeken * 0.7) {
      points.push({
        prio: 'orange',
        icon: '🤝',
        title: 'Commerciële bezoeken onder norm',
        reason: `Gem. ${ytdPerWk.bezoeken}/week YTD vs. norm ${norm.bezoeken}/week. Meer klantbezoeken verhogen het aantal matchgesprekken.`
      });
    }

    // 4. Aanbiedingen
    if (r26.totals.aanbiedingen === 0 && r26.weeksUsed > 4) {
      points.push({
        prio: 'red',
        icon: '📄',
        title: 'Geen aanbiedingen geregistreerd',
        reason: `Nul CV-aanbiedingen in de laatste 26 weken. Controleer of registratie ontbreekt of dat er een blokkade is in het aanbiedingsproces.`
      });
    } else if (ytdPerWk.aanbiedingen < norm.aanbiedingen * 0.75) {
      points.push({
        prio: 'red',
        icon: '📄',
        title: 'Aanbiedingen te laag',
        reason: `Gem. ${ytdPerWk.aanbiedingen}/week YTD vs. norm ${norm.aanbiedingen}/week. Meer CV's sturen vergroot de kans op matchgesprekken.`
      });
    }

    // 5. Aanbieding → Match conversie vs team
    if (a2m > 0 && a2m < ta2m * 0.6) {
      points.push({
        prio: 'red',
        icon: '🎯',
        title: `Lage conversie aanbied. → matchgesprek (${a2m}% vs. team ${ta2m}%)`,
        reason: `Van elke 100 aanbiedingen leidt slechts ${a2m}% tot een uitnodiging. Focus op kwaliteit en aansluiting van CV's bij de vacature.`
      });
    } else if (a2m > 0 && a2m < ta2m * 0.85) {
      points.push({
        prio: 'orange',
        icon: '🎯',
        title: `Conversie aanbied. → match kan beter (${a2m}% vs. team ${ta2m}%)`,
        reason: `Bespreek selectiecriteria: sturen we de juiste profielen naar de juiste opdrachten?`
      });
    }

    // 6. Match → Starter conversie
    if (m2s > 0 && m2s < tm2s * 0.6) {
      points.push({
        prio: 'red',
        icon: '🏁',
        title: `Lage closing rate matchgesprekken (${m2s}% vs. team ${tm2s}%)`,
        reason: `Na een matchgesprek volgt slechts ${m2s}% een starter. Voorbereiding kandidaat én afstemming met opdrachtgever verbeteren.`
      });
    } else if (m2s > 0 && m2s < tm2s * 0.85) {
      points.push({
        prio: 'orange',
        icon: '🏁',
        title: `Closing rate matchgesprekken onder teamgemiddelde (${m2s}% vs. ${tm2s}%)`,
        reason: `Bespreek wat er misgaat na het gesprek en hoe nazorg kan helpen.`
      });
    }

    // 7. Trend laatste 4 weken
    if (trend.intakes.delta < -1 && trend.intakes.recent < norm.intakes) {
      points.push({
        prio: 'orange',
        icon: '📉',
        title: `Intakes dalen afgelopen 4 weken (${trend.intakes.recent}/wk vs. ${trend.intakes.ytdAvg} YTD-gem.)`,
        reason: `Recente terugval in instroom van kandidaten. Controleer pipeline en zoekgedrag.`
      });
    }
    if (trend.starters.delta > 0.3) {
      points.push({
        prio: 'green',
        icon: '📈',
        title: `Positieve trend starters afgelopen 4 weken`,
        reason: `${trend.starters.recent}/week recent vs. ${trend.starters.ytdAvg} YTD-gem. Momentum vasthouden.`
      });
    }

    // Limit to top 4 most important (red first, then orange, then green)
    const sorted = [
      ...points.filter(p=>p.prio==='red'),
      ...points.filter(p=>p.prio==='orange'),
      ...points.filter(p=>p.prio==='green'),
    ].slice(0, 5);

    return { bm, ytd, expectedStarters, starterGap, starterPctOfDoel, i2a, a2m, m2s, ti2a, ta2m, tm2s, ytdPerWk, norm, trend, points: sorted, r26 };
  });

  // Status emoji
  function statusEmoji(gap) {
    if (gap >= 0)   return '🟢';
    if (gap >= -2)  return '🟡';
    return '🔴';
  }

  // Overview cards
  const overviewCards = bmData.map(d => `
    <div class="coach-card">
      <div class="coach-card-header" style="background:${d.starterGap>=0?'#f0fdf4':d.starterGap>=-2?'#fffbeb':'#fef2f2'}">
        <div>
          <div class="name">${d.bm.naam.split(' ')[0]}</div>
          <div style="font-size:.78rem;color:var(--muted);margin-top:2px">Doel: ${d.bm.doel}/jaar</div>
        </div>
        <div class="status">${statusEmoji(d.starterGap)}</div>
      </div>
      <div class="coach-card-body">
        <div class="coach-metric">
          <span class="mk">Starters YTD</span>
          <span class="mv">${fmt(d.ytd.starters,1)} / ${d.expectedStarters} verwacht</span>
        </div>
        <div class="coach-metric">
          <span class="mk">Intakes/week (YTD)</span>
          <span class="mv" style="color:${pct(d.ytdPerWk.intakes,d.norm.intakes)<80?'var(--warn)':'var(--success)'}">${d.ytdPerWk.intakes} <span style="color:var(--muted);font-weight:400">/ norm ${d.norm.intakes}</span></span>
        </div>
        <div class="coach-metric">
          <span class="mk">Aanbied.→Match</span>
          <span class="mv">${d.a2m > 0 ? d.a2m+'%' : '—'} <span style="color:var(--muted);font-weight:400">/ team ${d.ta2m}%</span></span>
        </div>
        <div class="coach-metric">
          <span class="mk">Match→Starter</span>
          <span class="mv">${d.m2s > 0 ? d.m2s+'%' : '—'} <span style="color:var(--muted);font-weight:400">/ team ${d.tm2s}%</span></span>
        </div>
        <div style="margin-top:10px">
          ${d.points.slice(0,2).map(p=>`<div style="font-size:.78rem;padding:4px 0;border-left:3px solid ${p.prio==='red'?'var(--danger)':p.prio==='orange'?'var(--warn)':'var(--success)'};padding-left:8px;margin-bottom:4px">${p.icon} ${p.title}</div>`).join('')}
        </div>
      </div>
    </div>
  `).join('');

  // Detailed sections per BM
  const details = bmData.map(d => `
    <div class="detail-section">
      <h3>${statusEmoji(d.starterGap)} ${d.bm.naam}
        <span style="font-size:.82rem;font-weight:600;color:var(--muted);margin-left:8px">
          ${fmt(d.ytd.starters,1)} starters YTD · doel ${d.bm.doel}/jaar
        </span>
      </h3>

      <div style="margin-bottom:14px">
        <div style="font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Funnelanalyse (laatste 26 weken)</div>
        <div class="funnel-row">
          <span class="funnel-box">Intake</span>
          <span class="funnel-arrow">→</span>
          <span class="funnel-pct">${d.i2a}x per intake</span>
          <span class="funnel-arrow">→</span>
          <span class="funnel-box">Aanbieding</span>
          <span class="funnel-arrow">→</span>
          <span class="funnel-pct">${d.a2m > 0 ? d.a2m+'%' : '—'} <span style="color:var(--muted)">(team: ${d.ta2m}%)</span></span>
          <span class="funnel-arrow">→</span>
          <span class="funnel-box">Match</span>
          <span class="funnel-arrow">→</span>
          <span class="funnel-pct">${d.m2s > 0 ? d.m2s+'%' : '—'} <span style="color:var(--muted)">(team: ${d.tm2s}%)</span></span>
          <span class="funnel-arrow">→</span>
          <span class="funnel-box">Starter</span>
        </div>
      </div>

      <div style="font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Coachpunten deze week</div>
      <ul class="focus-list">
        ${d.points.map(p=>`<li class="prio-${p.prio}">
          <span class="icon">${p.icon}</span><strong>${p.title}</strong>
          <span class="reason">${p.reason}</span>
        </li>`).join('')}
      </ul>

      <div class="week-actions">
        <h4>📌 Gespreksagenda – wat bespreek je deze week?</h4>
        <ul>
          ${d.points.filter(p=>p.prio==='red' || p.prio==='orange').slice(0,3).map(p=>`<li>${p.title.replace(/^\S+\s/, '')} — <em>${p.reason.split('.')[0]}.</em></li>`).join('') || '<li>Complimenten: alles loopt op schema. Bespreek hoe het momentum vast te houden.</li>'}
        </ul>

  `).join('');

  document.getElementById('main').innerHTML = `<div>
    <div class="person-header">
      <div class="person-name">🎯 Coachingsdashboard</div>
      <div class="person-meta">
        <span class="meta-pill">📅 Data t/m week ${CUR.week} · ${CUR.year}</span>
        <span class="meta-pill">⏱️ 1 week verwerkingstijd meegenomen</span>
        <span class="meta-pill">📐 Analyse o.b.v. laatste 26 weken + YTD ${getYear()}</span>
      </div>
    </div>

    <div class="section-title">Overzicht alle BM's</div>
    <div class="coach-grid">${overviewCards}</div>

    <div class="section-title">Gedetailleerde coachpunten per BM</div>
    ${details}

    ${renderMgmtSection(year)}
  </div>`;
}

function renderMgmtSection(year) {
  // Management bijdrage: Luc + Yoël, gezamenlijk doel 16 starters
  const mgmtRows = MGMT.map(m => {
    const rows = filterData(m.naam, year);
    const ytd  = ytdTotals(rows);
    return { ...m, ytd };
  });
  const mgmtTotalStarters = mgmtRows.reduce((s,m) => s + m.ytd.starters, 0);
  const passed = periodsPassedInYear(year, 'week');
  const expectedMgmt = +(MGMT_DOEL * passed / 52).toFixed(1);
  const mgmtGap  = +(mgmtTotalStarters - expectedMgmt).toFixed(1);
  const mgmtPct  = pct(mgmtTotalStarters, expectedMgmt || 1);
  const statusMgmt = mgmtGap >= 0 ? '🟢' : mgmtGap >= -2 ? '🟡' : '🔴';

  const personRows = mgmtRows.map(m => `
    <div class="coach-metric">
      <span class="mk" style="font-weight:600">${m.naam}</span>
      <span class="mv">${fmt(m.ytd.starters,1)} starters YTD
        ${m.ytd.intakes > 0 ? `· ${fmt(m.ytd.intakes,0)} intakes` : ''}
        ${m.ytd.bezoeken > 0 ? `· ${fmt(m.ytd.bezoeken,0)} bezoeken` : ''}
        ${m.ytd.aanbiedingen > 0 ? `· ${fmt(m.ytd.aanbiedingen,0)} aanbiedingen` : ''}
      </span>
    </div>`).join('');

  return `
    <div class="section-title">Management bijdrage (Luc &amp; Yoël)</div>
    <div class="detail-section" style="border-left:4px solid #0891b2">
      <h3>${statusMgmt} Gezamenlijk doel: ${MGMT_DOEL} starters/jaar
        <span style="font-size:.82rem;font-weight:600;color:var(--muted);margin-left:8px">
          ${fmt(mgmtTotalStarters,1)} YTD · verwacht ${expectedMgmt} bij week ${passed}
        </span>
      </h3>

      <div class="info-box blue" style="margin-bottom:12px">
        ℹ️ Luc en Yoël opereren buiten de standaard BM-funnel. Hun starters komen primair via
        hun netwerk, commerciële relaties en directe accountmanagement — niet via de intake→aanbieding→match keten.
        Daarom wordt hier alleen de startersvoortgang gevolgd, zonder funnelanalyse.
      </div>

      ${personRows}

      <div style="margin-top:14px">
        <div style="font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Gezamenlijke voortgang</div>
        <div class="progress-bar-bg" style="height:12px">
          <div class="progress-bar-fill" style="width:${mgmtPct}%;background:${barColor(mgmtPct)}"></div>
        </div>
        <div class="progress-sub">
          <span>${mgmtPct}% van verwacht schema</span>
          <span>Einddoel: ${MGMT_DOEL} starters</span>
        </div>
      </div>

      <div class="week-actions" style="margin-top:14px">
        <h4>📌 Gespreksagenda management</h4>
        <ul>
          ${mgmtGap < -1.5
            ? `<li>Achterstand van ${Math.abs(mgmtGap)} starters t.o.v. schema — bespreek welke concrete deals in de pipeline zitten en wanneer deze verwacht worden.</li>
               <li>Welke acties (bezoeken, aanbiedingen, netwerk) kunnen worden opgevoerd om het doel nog te halen?</li>`
            : mgmtGap < 0
            ? `<li>Lichte achterstand (${Math.abs(mgmtGap)} starters) — pipeline doorlopen en verwachte instroom inventariseren.</li>`
            : `<li>Op koers of voor op schema — momentum vasthouden. Bespreek welke kansen er nog in de pipeline zitten voor de rest van het jaar.</li>`
          }
        </ul>
      </div>
    </div>`;
}

// ── Prognose Panel ────────────────────────────────────────────────────────────
const JAAR_DOEL_AMBITIEUS = 103;
const NORM_NEW_BM = 12;          // 1 starter per maand = 12 per jaar
const NORM_NEW_BM_PER_MONTH = 1; // norm: 1 starter per maand per nieuwe medewerker

function renderPrognose() {
  const year = getYear();

  // Alleen huidige medewerkers meenemen in de prognose
  const CURRENT_STAFF = new Set([...BMS.map(b => b.naam), ...MGMT.map(m => m.naam)]);

  // Cumulative starters per week for selected year (alleen huidig personeel)
  const weekMap = {};
  for (const d of RAW) {
    if (d.jaar !== year) continue;
    if (!CURRENT_STAFF.has(d.naam)) continue;
    if (!weekMap[d.week]) weekMap[d.week] = 0;
    weekMap[d.week] += d.starters;
  }

  // Build cumulative series up to CUR.week (or week 52 for past years)
  const maxWk    = year < CUR.year ? 52 : CUR.week;
  const cumActual = [];
  let runSum = 0;
  for (let w = 1; w <= 52; w++) {
    if (w <= maxWk) runSum += (weekMap[w] || 0);
    cumActual.push(w <= maxWk ? runSum : null);
  }

  const ytdStarters   = runSum;
  const ratePerWk     = maxWk > 0 ? ytdStarters / maxWk : 0;
  const extrapolated  = +(ratePerWk * 52).toFixed(1);

  // Lines for chart
  const wkLabels   = Array.from({length:52}, (_,i) => 'W'+(i+1));
  const budgetLine = wkLabels.map((_,i) => +((TOTAAL_DOEL / 52) * (i+1)).toFixed(1));
  const goalLine   = wkLabels.map((_,i) => +((JAAR_DOEL_AMBITIEUS / 52) * (i+1)).toFixed(1));
  const extrapLine = cumActual.map((v,i) =>
    v !== null ? null : +(ytdStarters + ratePerWk * (i + 1 - maxWk)).toFixed(1)
  );
  // Connect extrapolation to last actual point
  if (maxWk > 0 && maxWk < 52) extrapLine[maxWk - 1] = ytdStarters;

  // Gap tussen huidig tempo en doel 103
  const gapToGoal = +(JAAR_DOEL_AMBITIEUS - extrapolated).toFixed(1);

  // ── Groeiscenario: 1 nieuwe medewerker per maand vanaf huidige maand ─────
  // Norm: 1 starter per maand per nieuwe medewerker (flat, geen opbouwfase)
  const weeklyRateNew = NORM_NEW_BM_PER_MONTH / (52 / 12); // 1 starter/mnd → per week

  // Startweek van elke kalendermaand (ISO-benadering)
  const maandStartWk = [1,5,9,14,18,23,27,31,36,40,44,49];
  const curMonthIdx  = new Date().getMonth(); // 0-based

  // 1 hire per maand vanaf huidige maand t/m december
  const hireWeeks = maandStartWk.slice(curMonthIdx);

  // Cumulatieve extra starters per week door alle nieuwe hires samen
  const hireExtra = new Array(52).fill(0);
  for (const startWk of hireWeeks) {
    let runningHire = 0;
    for (let w = startWk; w <= 52; w++) {
      runningHire += weeklyRateNew;
      hireExtra[w - 1] += runningHire;
    }
  }

  // Groeiscenario-lijn: alleen zichtbaar vanaf maxWk
  // = extrapolatie huidig team + cumulatieve bijdrage nieuwe hires
  const growthLine = wkLabels.map((_, i) => {
    const w = i + 1;
    if (w < maxWk) return null;
    if (w === maxWk) return ytdStarters;
    const teamExtrap = ytdStarters + ratePerWk * (w - maxWk);
    return +(teamExtrap + hireExtra[i]).toFixed(1);
  });

  // Jaar-end waarde van groeiscenario
  const growthYearEnd = +(ytdStarters + ratePerWk * (52 - maxWk) + hireExtra[51]).toFixed(1);
  const gapToGoal2    = +(JAAR_DOEL_AMBITIEUS - growthYearEnd).toFixed(1);

  document.getElementById('main').innerHTML = `<div>
    <div class="person-header">
      <div class="person-name">📈 Prognose & Groeiplanning</div>
      <div class="person-meta">
        <span class="meta-pill">🎯 Ambitieus doel: ${JAAR_DOEL_AMBITIEUS} starters/${year}</span>
        <span class="meta-pill">📊 Huidig tempo: ${extrapolated} starters/jaar</span>
        <span class="meta-pill">📥 Groeiscenario jaar-einde: ${growthYearEnd} starters</span>
      </div>
    </div>

    <!-- Cumulative chart -->
    <div class="section-title">Begrote vs. gerealiseerde starters (cumulatief ${year})</div>
    <div class="chart-card">
      <h3>
        🟢 Realisatie · 🔵 Teamdoel ${TOTAAL_DOEL} · 🟠 Doel ${JAAR_DOEL_AMBITIEUS} ·
        ⬜ Huidig tempo · 🟣 Groeiscenario (+ 1 hire/maand vanaf ${['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'][curMonthIdx]})
      </h3>
      <div class="chart-wrap" style="height:340px"><canvas id="chartCum"></canvas></div>
    </div>

    <!-- Gap analyse -->
    <div class="section-title">Gapanalyse</div>
    <div class="kpi-grid" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr))">
      <div class="kpi-card">
        <div class="label">YTD gerealiseerd</div>
        <div class="value" style="color:var(--success)">${ytdStarters}</div>
        <div class="sub">starters t/m week ${maxWk}</div>
      </div>
      <div class="kpi-card">
        <div class="label">Huidig tempo (jaar-einde)</div>
        <div class="value" style="color:${extrapolated>=TOTAAL_DOEL?'var(--success)':'var(--warn)'}">${extrapolated}</div>
        <div class="sub">zonder nieuwe medewerkers</div>
      </div>
      <div class="kpi-card">
        <div class="label">Groeiscenario (jaar-einde)</div>
        <div class="value" style="color:var(--primary)">${growthYearEnd}</div>
        <div class="sub">+ 1 hire/maand · ${hireWeeks.length} nieuwe medewerkers</div>
      </div>
      <div class="kpi-card">
        <div class="label">Resterende gap naar ${JAAR_DOEL_AMBITIEUS}</div>
        <div class="value" style="color:${gapToGoal2<=0?'var(--success)':'var(--danger)'}">${gapToGoal2 <= 0 ? '✓ gehaald' : gapToGoal2}</div>
        <div class="sub">${gapToGoal2 <= 0 ? 'Doel haalbaar met dit scenario' : 'nog extra nodig bij groeiscenario'}</div>
      </div>
    </div>

    <div class="info-box blue" style="margin-top:4px">
      💡 Het groeiscenario gaat uit van <strong>${hireWeeks.length} nieuwe medewerkers</strong> die starten in
      ${['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'][curMonthIdx]}–dec ${year},
      elk met een norm van <strong>${NORM_NEW_BM_PER_MONTH} starter per maand</strong> (= ${NORM_NEW_BM} starters/jaar), direct vanaf de startdatum.
    </div>
  </div>`;

  setTimeout(() => {
    destroyChart('chartCum');
    const ctx = document.getElementById('chartCum')?.getContext('2d');
    if (ctx) {
      charts['chartCum'] = new Chart(ctx, {
        type: 'line',
        data: {
          labels: wkLabels,
          datasets: [
            { label: 'Realisatie',             data: cumActual,   borderColor: '#0e9f6e', backgroundColor: '#0e9f6e22', fill: true,  tension: .3, pointRadius: 2, spanGaps: false },
            { label: 'Teamdoel ' + TOTAAL_DOEL, data: budgetLine, borderColor: '#1a56db', borderDash: [6,4], pointRadius: 0, fill: false },
            { label: 'Doel ' + JAAR_DOEL_AMBITIEUS, data: goalLine, borderColor: '#f59e0b', borderWidth: 2.5, pointRadius: 0, fill: false },
            { label: 'Huidig tempo (extrap.)', data: extrapLine,  borderColor: '#9ca3af', borderDash: [3,3], pointRadius: 0, fill: false, spanGaps: false },
            { label: 'Groeiscenario +1/mnd',  data: growthLine,  borderColor: '#7e3af2', borderWidth: 2, pointRadius: 0, fill: false, spanGaps: false },
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position: 'top', labels: { boxWidth: 14, font: { size: 11 } } },
            tooltip: { mode: 'index', intersect: false,
              callbacks: { label: c => c.dataset.label + ': ' + (c.parsed.y !== null ? c.parsed.y.toFixed(1) : '—') }
            }
          },
          scales: {
            x: { grid: { display: false }, ticks: { font: { size: 9 }, maxTicksLimit: 26 } },
            y: { beginAtZero: true, grid: { color: '#f0f0f0' }, ticks: { font: { size: 10 } } }
          }
        }
      });
    }
  }, 50);
}


// ══════════════════════════════════════════════════════════════════════════════
// PIPELINE KANBAN — 4-weken cyclus × 5 fases
// ══════════════════════════════════════════════════════════════════════════════

function getPipeWeeks() {
  const weeks = [];
  for (let offset = -2; offset <= 1; offset++) {
    const d = new Date(+TODAY + offset * 7 * 86400000);
    const w = isoWeek(d);
    weeks.push({ year: w.year, week: w.week, offset });
  }
  return weeks;
}

// New key (pipeline2_) so old v1 data doesn't conflict
function pipeKey(bmNaam) { return 'pipeline2_' + btoa(unescape(encodeURIComponent(bmNaam))); }

function pipeLoad(bmNaam) {
  if (supa) return (PIPE_CACHE[bmNaam] || []).slice();
  // Demo-modus zonder databasekoppeling: lokale opslag in de browser
  try {
    const raw = localStorage.getItem(pipeKey(bmNaam));
    if (raw) { const parsed = JSON.parse(raw); if (Array.isArray(parsed)) return parsed; }
  } catch(e) {}
  return [];
}

function pipeSave(bmNaam, cards) {
  if (supa) { PIPE_CACHE[bmNaam] = cards; return; }
  try { localStorage.setItem(pipeKey(bmNaam), JSON.stringify(cards)); } catch(e) {}
}

// Haalt alle pipeline-kaarten op uit de database (RLS zorgt dat een BM alleen
// eigen kaarten terugkrijgt; de manager krijgt alles).
async function pipeFetchAll() {
  if (!supa) return;
  const { data, error } = await supa.from('pipeline_cards').select('*');
  if (error) { console.error('Pipeline laden mislukt:', error); return; }
  const next = {};
  (data || []).forEach(c => {
    if (!next[c.bm_naam]) next[c.bm_naam] = [];
    next[c.bm_naam].push({ id: c.id, naam: c.naam, notitie: c.notitie, datum: c.datum, stage: c.stage, week: c.week, jaar: c.jaar, aanb: c.aanb, functie: c.functie, salarisindicatie: c.salarisindicatie, regio: c.regio, gesprek: c.gesprek });
  });
  PIPE_CACHE = next;
}

function pipeUid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

// Drag state — var so hoisting works before render()
var _pipeDrag = { bmNaam: null, stage: null, week: null, jaar: null, cardId: null };

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escApos(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function renderPipeline(bm) {
  const cards  = pipeLoad(bm.naam);
  const weeks  = getPipeWeeks();
  const bmE    = escApos(bm.naam);

  // Column headers
  const hdrs = PIPE_STAGES.map((stage, si) => {
    const col = PIPE_STAGE_COLORS[si];
    const cnt = cards.filter(c => c.stage === stage).length;
    return `<div class="pipe-col-hdr" style="background:${col.bg};color:${col.text}">
      ${stage}<span class="pipe-count-sm">${cnt}</span>
    </div>`;
  }).join('');

  // Week rows
  const rows = weeks.map(wk => {
    const isCur   = wk.offset === 0;
    const isPast  = wk.offset < 0;
    const wkTag   = isCur ? 'huidig' : wk.offset === 1 ? 'volgend' : wk.offset === -1 ? 'vorige' : '-2 wkn';
    const wkTotal = cards.filter(c => c.week === wk.week && c.jaar === wk.year).length;

    const cells = PIPE_STAGES.map((stage, si) => {
      const col       = PIPE_STAGE_COLORS[si];
      const isAanb    = stage === 'Aanbieden';
      const isMatch   = stage === 'Matchgesprekken';
      const cellCards = cards.filter(c => c.stage === stage && c.week === wk.week && c.jaar === wk.year);
      const cellCount = cellCards.length;

      const cardsHtml = cellCards.map(c => {
        const aanbHtml = isAanb
          ? `<div class="card-aanb-row">
               <span class="card-aanb-label">Aanbod:</span>
               <input class="card-aanb-input" type="number" min="0" max="99" value="${c.aanb||0}"
                 onchange="pipeUpdateAanb('${bmE}','${c.id}',this.value)"
                 onclick="event.stopPropagation()" ondragstart="event.stopPropagation()"/>
             </div>`
          : '';
        const gesprekOpts = [1,2,3].map(n => `<option value="${n}" ${c.gesprek===n?'selected':''}>${n===1?'1e':n===2?'2e':'3e'} gesprek</option>`).join('');
        const gesprekHtml = isMatch
          ? `<div class="card-aanb-row">
               <select class="card-aanb-input" style="width:auto;flex:1;font-weight:600;"
                 onchange="pipeUpdateGesprek('${bmE}','${c.id}',this.value)"
                 onclick="event.stopPropagation()" ondragstart="event.stopPropagation()">
                 <option value="">Gesprek —</option>
                 ${gesprekOpts}
               </select>
             </div>`
          : '';
        const metaBits = [c.functie, c.regio, c.salarisindicatie ? ('SI: ' + c.salarisindicatie) : ''].filter(Boolean);
        const metaHtml = metaBits.length ? `<div class="card-sub">${escHtml(metaBits.join(' · '))}</div>` : '';
        return `<div class="pipe-card" draggable="true"
          ondragstart="pipeDragStart(event,'${bmE}','${escApos(stage)}',${wk.week},${wk.year},'${c.id}')"
          ondragend="pipeDragEnd(event)">
          <div class="card-naam">${escHtml(c.naam)}<span class="card-naam-btns"><button class="card-edit" onclick="event.stopPropagation();pipeOpenEditModal('${bmE}','${c.id}')" title="Wijzigen">✏️</button><button class="card-del" onclick="event.stopPropagation();pipeDelete('${bmE}','${c.id}')" title="Verwijderen">✕</button></span></div>
          ${metaHtml}
          ${c.notitie ? `<div class="card-sub">${escHtml(c.notitie)}</div>` : ''}
          ${gesprekHtml}
          ${aanbHtml}
        </div>`;
      }).join('');

      return `<div class="pipe-cell${isCur?' pipe-cell-now':isPast?' pipe-cell-past':''}"
        ondragover="pipeDragOver(event)"
        ondragleave="pipeDragLeave(event)"
        ondrop="pipeDrop(event,'${bmE}','${escApos(stage)}',${wk.week},${wk.year})">
        <div class="pipe-cell-hdr" style="background:${col.bg}">
          <span class="pipe-cell-hdr-name" style="color:${col.text}">${stage}</span>
          <span class="pipe-cell-hdr-cnt" style="background:${col.text}22;color:${col.text}">${cellCount}</span>
        </div>
        ${cardsHtml}
        <button class="pipe-add-btn" onclick="pipeOpenModal('${bmE}','${escApos(stage)}',${wk.week},${wk.year})">+ toevoegen</button>
      </div>`;
    }).join('');

    return `<div class="pipe-row">
      <div class="pipe-week-label${isCur?' pipe-wk-now':isPast?' pipe-wk-past':''}">
        <span class="pipe-wk-num">W${wk.week}</span>
        <span class="pipe-wk-tag">${wkTag}<br/>${wk.year}</span>
        ${wkTotal > 0 ? `<span class="pipe-wk-total">${wkTotal}</span>` : ''}
      </div>
      ${cells}
    </div>`;
  }).join('');

  return `<div class="section-title">🗂️ Kandidaten pipeline <span style="font-size:.78rem;font-weight:400;color:var(--muted);margin-left:8px">${cards.length} kandidaten actief</span></div>
  <div class="info-box blue" style="margin-bottom:10px">💡 Sleep kaartjes naar een andere fase of week. Opgeslagen in je browser.</div>
  <div class="pipe-grid-wrap"><div class="pipe-grid">
    <div class="pipe-grid-corner"></div>${hdrs}${rows}
  </div></div>`;
}

// ── Drag & drop ───────────────────────────────────────────────────────────────
function pipeDragStart(e, bmNaam, stage, week, jaar, cardId) {
  _pipeDrag = { bmNaam, stage, week, jaar, cardId };
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function pipeDragEnd(e) { e.currentTarget.classList.remove('dragging'); }
function pipeDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function pipeDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function pipeDrop(e, bmNaam, toStage, toWeek, toJaar) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const { bmNaam: fromBM, stage: fromStage, week: fromWeek, jaar: fromJaar, cardId } = _pipeDrag;
  if (!cardId || fromBM !== bmNaam) return;
  if (fromStage === toStage && fromWeek === toWeek && fromJaar === toJaar) return;
  const cards = pipeLoad(bmNaam);
  const card  = cards.find(c => c.id === cardId);
  if (!card) return;
  card.stage = toStage; card.week = toWeek; card.jaar = toJaar;
  if (toStage !== 'Aanbieden') delete card.aanb;
  pipeSave(bmNaam, cards);
  render();
  if (supa) supa.from('pipeline_cards')
    .update({ stage: toStage, week: toWeek, jaar: toJaar, aanb: card.aanb ?? null, updated_by: CURRENT_USER?.id, updated_at: new Date().toISOString() })
    .eq('id', cardId)
    .then(({error}) => { if (error) console.error('Kaart verplaatsen mislukt:', error); });
}

// ── Add / bewerk card modal (zelfde modal, cardId bepaalt de modus) ──────────
var _pipeModalCtx = { bmNaam: null, stage: null, week: null, jaar: null, cardId: null };

function _pipeToggleIntakeFields(stage) {
  document.getElementById('pipe-modal-intake-fields').style.display = (stage === 'Intake') ? 'block' : 'none';
}
function pipeOpenModal(bmNaam, stage, week, jaar) {
  _pipeModalCtx = { bmNaam, stage, week, jaar, cardId: null };
  document.getElementById('pipe-modal-title').textContent = '➕ Kandidaat toevoegen';
  document.getElementById('pipe-modal-stage-label').textContent = stage + ' · Week ' + week + ' (' + jaar + ')';
  document.getElementById('pipe-modal-naam').value = '';
  document.getElementById('pipe-modal-notitie').value = '';
  document.getElementById('pipe-modal-functie').value = '';
  document.getElementById('pipe-modal-si').value = '';
  document.getElementById('pipe-modal-regio').value = '';
  _pipeToggleIntakeFields(stage);
  document.getElementById('pipe-modal-ok-btn').textContent = 'Toevoegen';
  document.getElementById('pipe-modal').classList.add('open');
  setTimeout(() => document.getElementById('pipe-modal-naam').focus(), 50);
}
function pipeOpenEditModal(bmNaam, cardId) {
  const card = pipeLoad(bmNaam).find(c => c.id === cardId);
  if (!card) return;
  _pipeModalCtx = { bmNaam, stage: card.stage, week: card.week, jaar: card.jaar, cardId };
  document.getElementById('pipe-modal-title').textContent = '✏️ Kandidaat wijzigen';
  document.getElementById('pipe-modal-stage-label').textContent = card.stage + ' · Week ' + card.week + ' (' + card.jaar + ')';
  document.getElementById('pipe-modal-naam').value = card.naam || '';
  document.getElementById('pipe-modal-notitie').value = card.notitie || '';
  document.getElementById('pipe-modal-functie').value = card.functie || '';
  document.getElementById('pipe-modal-si').value = card.salarisindicatie || '';
  document.getElementById('pipe-modal-regio').value = card.regio || '';
  _pipeToggleIntakeFields(card.stage);
  document.getElementById('pipe-modal-ok-btn').textContent = 'Opslaan';
  document.getElementById('pipe-modal').classList.add('open');
  setTimeout(() => document.getElementById('pipe-modal-naam').focus(), 50);
}
function pipeCloseModal() { document.getElementById('pipe-modal').classList.remove('open'); }
async function pipeConfirmAdd() {
  const naam = document.getElementById('pipe-modal-naam').value.trim();
  if (!naam) { document.getElementById('pipe-modal-naam').focus(); return; }
  const notitie = document.getElementById('pipe-modal-notitie').value.trim();
  const { bmNaam, stage, week, jaar, cardId } = _pipeModalCtx;
  const isIntake = stage === 'Intake';
  const functie  = isIntake ? document.getElementById('pipe-modal-functie').value.trim() : undefined;
  const si       = isIntake ? document.getElementById('pipe-modal-si').value.trim() : undefined;
  const regio    = isIntake ? document.getElementById('pipe-modal-regio').value : undefined;

  if (cardId) {
    // Bewerken van een bestaande kandidaat
    const updatePayload = { naam, notitie, updated_by: CURRENT_USER?.id, updated_at: new Date().toISOString() };
    if (isIntake) { updatePayload.functie = functie; updatePayload.salarisindicatie = si; updatePayload.regio = regio; }
    if (supa) {
      const { error } = await supa.from('pipeline_cards').update(updatePayload).eq('id', cardId);
      if (error) { alert('Kandidaat wijzigen mislukt: ' + error.message); return; }
    }
    const cards = pipeLoad(bmNaam);
    const card  = cards.find(c => c.id === cardId);
    if (card) {
      card.naam = naam; card.notitie = notitie;
      if (isIntake) { card.functie = functie; card.salarisindicatie = si; card.regio = regio; }
    }
    pipeSave(bmNaam, cards);
    pipeCloseModal();
    render();
    return;
  }

  // Nieuwe kandidaat toevoegen
  const datum = new Date().toLocaleDateString('nl-NL');
  const insertPayload = { bm_naam: bmNaam, naam, notitie, stage, week, jaar, updated_by: CURRENT_USER?.id };
  if (isIntake) { insertPayload.functie = functie; insertPayload.salarisindicatie = si; insertPayload.regio = regio; }
  let newCard;
  if (supa) {
    const { data, error } = await supa.from('pipeline_cards')
      .insert(insertPayload)
      .select().single();
    if (error) { alert('Kandidaat toevoegen mislukt: ' + error.message); return; }
    newCard = { id: data.id, naam: data.naam, notitie: data.notitie, datum: data.datum, stage: data.stage, week: data.week, jaar: data.jaar, aanb: data.aanb, functie: data.functie, salarisindicatie: data.salarisindicatie, regio: data.regio, gesprek: data.gesprek };
  } else {
    newCard = { id: pipeUid(), naam, notitie, datum, stage, week, jaar, functie, salarisindicatie: si, regio };
  }
  const cards = pipeLoad(bmNaam);
  cards.push(newCard);
  pipeSave(bmNaam, cards);
  pipeCloseModal();
  render();
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('pipe-modal').classList.contains('open')) {
    if (document.activeElement?.id !== 'pipe-modal-notitie') pipeConfirmAdd();
  }
  if (e.key === 'Escape') pipeCloseModal();
});

// ── Update aanbieden count ────────────────────────────────────────────────────
function pipeUpdateAanb(bmNaam, cardId, value) {
  const cards = pipeLoad(bmNaam);
  const card  = cards.find(c => c.id === cardId);
  if (!card) return;
  card.aanb = parseInt(value, 10) || 0;
  pipeSave(bmNaam, cards);
  if (supa) supa.from('pipeline_cards')
    .update({ aanb: card.aanb, updated_by: CURRENT_USER?.id, updated_at: new Date().toISOString() })
    .eq('id', cardId)
    .then(({error}) => { if (error) console.error('Aanbod bijwerken mislukt:', error); });
}

// ── Update gesprek-ronde (1e/2e/3e) ────────────────────────────────────────────
function pipeUpdateGesprek(bmNaam, cardId, value) {
  const cards = pipeLoad(bmNaam);
  const card  = cards.find(c => c.id === cardId);
  if (!card) return;
  card.gesprek = value ? parseInt(value, 10) : null;
  pipeSave(bmNaam, cards);
  if (supa) supa.from('pipeline_cards')
    .update({ gesprek: card.gesprek, updated_by: CURRENT_USER?.id, updated_at: new Date().toISOString() })
    .eq('id', cardId)
    .then(({error}) => { if (error) console.error('Gesprek bijwerken mislukt:', error); });
}

// ── Delete card ───────────────────────────────────────────────────────────────
function pipeDelete(bmNaam, cardId) {
  pipeSave(bmNaam, pipeLoad(bmNaam).filter(c => c.id !== cardId));
  render();
  if (supa) supa.from('pipeline_cards').delete().eq('id', cardId)
    .then(({error}) => { if (error) console.error('Kaart verwijderen mislukt:', error); });
}

</script>

<!-- Pipeline: kandidaat toevoegen modal -->

  <div class="pipe-modal">
    <h4 id="pipe-modal-title">➕ Kandidaat toevoegen</h4>
    <p class="pipe-modal-sub" id="pipe-modal-stage-label">Fase: —</p>
    <input type="text" id="pipe-modal-naam" placeholder="Naam kandidaat" autocomplete="off"/>

        <input type="text" id="pipe-modal-functie" placeholder="Functie" autocomplete="off" style="flex:1;"/>
        <input type="text" id="pipe-modal-si" placeholder="SI (salarisindicatie)" autocomplete="off" style="flex:1;"/>
      </div>
      <select id="pipe-modal-regio" style="margin-bottom:10px;">
        <option value="">Regio (kies)</option>
        <option value="Noord">Noord</option>
        <option value="Midden">Midden</option>
        <option value="Zuid">Zuid</option>
      </select>
    </div>
    <textarea id="pipe-modal-notitie" placeholder="Notitie (optioneel)" rows="2"></textarea>
    <div class="pipe-modal-btns">
      <button class="pipe-modal-cancel" onclick="pipeCloseModal()">Annuleren</button>
      <button class="pipe-modal-ok" id="pipe-modal-ok-btn" onclick="pipeConfirmAdd()">Toevoegen</button>
    </div>
  </div>
</div>
